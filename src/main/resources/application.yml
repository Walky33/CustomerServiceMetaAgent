server:
  port: 8080

spring:
  application:
    name: meta-agent-simple
  datasource:
    url: jdbc:h2:mem:metaagentdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      settings:
        web-allow-others: true
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

storage:
  upload-dir: ./uploads

agent:
  confidence-threshold: 0.55